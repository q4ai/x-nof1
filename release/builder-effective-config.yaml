directories:
  output: release
  buildResources: build
appId: ai.nof1.desktop
productName: nof1.ai
copyright: Copyright © 2025 195440
files:
  - filter:
      - dist/**/*
      - public/**/*
      - electron/**/*
      - package.json
      - node_modules/**/*
      - '!release/**/*'
      - '!**/*.log'
asar: true
extraMetadata:
  main: electron/main.cjs
mac:
  target:
    - dmg
  category: public.app-category.finance
  artifactName: nof1-ai-${version}.dmg
  hardenedRuntime: true
  gatekeeperAssess: false
dmg:
  sign: false
  artifactName: nof1-ai-${version}.dmg
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: nof1-ai-${version}-setup.exe
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
electronVersion: 39.2.0
